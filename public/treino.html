<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Treino - OldBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">← Voltar</a>
      <span class="fw-bold" id="treinoNome"></span>
    </div>
  </nav>

  <div class="container my-4">
    <div id="exercicios"></div>
    <button class="btn btn-success mt-4" id="btnFinalizar">Finalizar treino</button>
  </div>

  <script>
    let treinoId = null;
    let execucaoId = null;
    let treino = null;
    let ultimoTreino = null;

    // Carrega treino e inicia execução
    async function iniciarTreino() {
      treinoId = localStorage.getItem("treinoSelecionado");

      if (!treinoId) {
        alert("Erro: Nenhum treino selecionado");
        window.location.href = "index.html";
        return;
      }

      try {
        // Busca detalhes do treino
        const resposta = await fetch(`/api/treinos/${treinoId}`);
        treino = await resposta.json();

        document.getElementById("treinoNome").textContent = treino.nome;

        // Busca dados do último treino (se existir)
        const resUltimo = await fetch(`/api/treinos/${treinoId}/ultimo`);
        ultimoTreino = await resUltimo.json();

        // Inicia nova execução
        const resExec = await fetch(`/api/treinos/${treinoId}/executar`, {
          method: "POST"
        });
        const dadosExec = await resExec.json();
        execucaoId = dadosExec.execucao_id;

        // Renderiza exercícios
        renderizarExercicios();

      } catch (erro) {
        alert("Erro ao carregar treino: " + erro.message);
        window.location.href = "index.html";
      }
    }

    function renderizarExercicios() {
      const container = document.getElementById("exercicios");
      container.innerHTML = "";

      treino.exercicios.forEach((ex, i) => {
        // Busca dados do último treino para este exercício
        let dadosUltimo = null;
        if (ultimoTreino.existe) {
          dadosUltimo = ultimoTreino.series_por_exercicio.find(s => s.exercicio_id === ex.id);
        }

        const numSeriesInicial = dadosUltimo ? dadosUltimo.series.length : 3;
        const isIsometrico = ex.tipo === 'isometrico';
        const labelUnidade = isIsometrico ? 'Segundos' : 'Repetições';
        const emojiTipo = isIsometrico ? '⏱️' : '🏋️';

        const bloco = `
          <div class="card p-3 mb-3 shadow-sm">
            <h5 class="mb-3">${emojiTipo} ${ex.nome}</h5>

            <div class="mb-2">
              <label class="form-label fw-semibold">Quantas séries você fez?</label>
              <input
                type="number"
                id="numSeries-${i}"
                class="form-control"
                min="1"
                max="15"
                value="${numSeriesInicial}"
                onchange="gerarInputsSeries(${i})">
            </div>

            <div id="seriesContainer-${i}"></div>
          </div>
        `;
        container.innerHTML += bloco;

        // Gera inputs com dados pré-preenchidos
        gerarInputsSeries(i);
      });
    }

    function gerarInputsSeries(exIndex) {
      const exercicio = treino.exercicios[exIndex];
      const numSeries = document.getElementById(`numSeries-${exIndex}`).value;
      const container = document.getElementById(`seriesContainer-${exIndex}`);

      // Busca dados do último treino para este exercício
      let dadosUltimo = null;
      if (ultimoTreino.existe) {
        dadosUltimo = ultimoTreino.series_por_exercicio.find(s => s.exercicio_id === exercicio.id);
      }

      const isIsometrico = exercicio.tipo === 'isometrico';
      const labelUnidade = isIsometrico ? 'Segundos' : 'Repetições';

      container.innerHTML = "";

      for (let s = 0; s < numSeries; s++) {
        // Pré-preenche com dados do último treino (se existir)
        let pesoAnterior = "";
        let repsAnterior = "";

        if (dadosUltimo && dadosUltimo.series[s]) {
          pesoAnterior = dadosUltimo.series[s].peso;
          repsAnterior = dadosUltimo.series[s].repeticoes;
        }

        container.innerHTML += `
          <div class="row mb-2">
            <div class="col">
              <label class="form-label">Série ${s + 1} - Peso (kg):</label>
              <input
                type="number"
                id="peso-${exIndex}-${s}"
                class="form-control"
                min="0"
                step="0.5"
                value="${pesoAnterior}"
                placeholder="${pesoAnterior || 'Ex: 80'}">
            </div>
            <div class="col">
              <label class="form-label">${labelUnidade}:</label>
              <input
                type="number"
                id="reps-${exIndex}-${s}"
                class="form-control"
                min="1"
                value="${repsAnterior}"
                placeholder="${repsAnterior || (isIsometrico ? 'Ex: 30' : 'Ex: 10')}">
            </div>
          </div>
        `;
      }
    }

    async function finalizarTreino() {
      if (!execucaoId) {
        alert("Erro: Execução não foi iniciada");
        return;
      }

      const btnFinalizar = document.getElementById("btnFinalizar");
      btnFinalizar.disabled = true;
      btnFinalizar.textContent = "Salvando...";

      try {
        // Coleta dados de todas as séries
        let ordemGlobal = 1;

        for (let i = 0; i < treino.exercicios.length; i++) {
          const exercicio = treino.exercicios[i];
          const numSeries = document.getElementById(`numSeries-${i}`).value;

          for (let s = 0; s < numSeries; s++) {
            const peso = document.getElementById(`peso-${i}-${s}`).value;
            const reps = document.getElementById(`reps-${i}-${s}`).value;

            if (!peso || !reps) {
              const isIsometrico = exercicio.tipo === 'isometrico';
              const unidade = isIsometrico ? 'segundos' : 'reps';
              alert(`Preencha peso e ${unidade} da série ${s + 1} do exercício ${exercicio.nome}`);
              btnFinalizar.disabled = false;
              btnFinalizar.textContent = "Finalizar treino";
              return;
            }

            // Salva série na API
            await fetch(`/api/execucoes/${execucaoId}/series`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                exercicio_id: exercicio.id,
                peso: parseFloat(peso),
                repeticoes: parseInt(reps),
                ordem: ordemGlobal
              })
            });

            ordemGlobal++;
          }
        }

        // Finaliza execução (calcula volume)
        const resFinal = await fetch(`/api/execucoes/${execucaoId}/finalizar`, {
          method: "POST"
        });

        const resultado = await resFinal.json();

        // Busca progressão
        const resProgressao = await fetch(`/api/treinos/${treinoId}/progressao`);
        const progressao = await resProgressao.json();

        // Mostra resultado
        let mensagem = `✅ Treino finalizado!\n\n`;
        mensagem += `Volume total: ${resultado.volume_total.toFixed(2)}\n\n`;

        if (progressao.progresso_percentual !== null) {
          const emoji = progressao.progresso_percentual >= 0 ? "📈" : "📉";
          mensagem += `${emoji} Progressão desde a base: ${progressao.progresso_percentual.toFixed(2)}%\n\n`;
        }

        if (progressao.delta_reps_por_exercicio && progressao.delta_reps_por_exercicio.length > 0) {
          mensagem += `Δ desde o último treino:\n`;
          progressao.delta_reps_por_exercicio.forEach(item => {
            // Verifica se é isométrico para mostrar unidade correta
            const ex = treino.exercicios.find(e => e.nome === item.exercicio_nome);
            const unidade = ex && ex.tipo === 'isometrico' ? 'seg' : 'reps';

            const emoji = item.delta_reps >= 0 ? "✅" : "⚠️";
            mensagem += `${emoji} ${item.exercicio_nome}: ${item.delta_reps > 0 ? '+' : ''}${item.delta_reps} ${unidade}\n`;
          });
        }

        alert(mensagem);
        window.location.href = "index.html";

      } catch (erro) {
        alert("Erro ao finalizar treino: " + erro.message);
        btnFinalizar.disabled = false;
        btnFinalizar.textContent = "Finalizar treino";
      }
    }

    // Event listeners
    document.getElementById("btnFinalizar").addEventListener("click", finalizarTreino);

    // Inicia ao carregar página
    iniciarTreino();
  </script>
</body>
</html>
