<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OldBook Treinos - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="./JSFiles/cadTreino.js"></script>
</head>
<body>
  <nav class="navbar navbar-dark">
    <div class="container">
      <a class="btn btn-primary" href="index.html">voltar</a>
      <a class="navbar-brand fw-bold" href="index.html">OldBook Treinos</a>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="text-center mb-4">Cadastrar</h2>
    <div id="treinos" class="row g-4"></div>
  </div>

  <div id="containerAddTreino" class="form-control form-control-sm d-inline-block me-2 mb-2 text-center">
    <div id="idRemover">
        <form>
          <label for="nomeUsuario">Digite o nome do treino:</label>
          <input type="text" id="nomeTreino" class ="form-control me-2">
        </form>
        <button id="btnAddEx" class="btn btn-primary my-4">
          Adicionar Exercício
        </button>
    </div>
  </div>

  <!-- Container separado para exercícios adicionados -->
  <div id="exerciciosAdicionados" class="container my-4"></div>

  <!-- Botão de finalizar sempre no final -->
  <div id="containerBotaoFinalizar" class="container my-4 text-center"></div>
</body>
</html>
