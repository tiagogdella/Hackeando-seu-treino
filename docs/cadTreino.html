<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hackeando seu treino">
  <title>Hackeando seu Treino - Cadastrar</title>
  <link rel="icon" type="image/png" href="IMG/logoMenor.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <link rel="apple-touch-icon" href="/docs/apple-touch-icon.png">
</head>
<body>
  <nav class="navbar navbar-dark">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="btn btn-primary btn-sm" href="index.html">&lt; voltar</a>
      <a class="navbar-brand fw-bold" href="index.html">&lt;/&gt; Hackeando seu Treino</a>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger terminal-command">
        logout
      </button>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="text-center mb-4 terminal-command">novo_treino</h2>
    <div id="treinos" class="row g-4"></div>
  </div>

  <div id="containerAddTreino" class="form-control form-control-sm d-inline-block me-2 mb-2 text-center">
    <div id="idRemover">
        <form>
          <label for="nomeUsuario" class="terminal-prompt">Nome do treino</label>
          <input type="text" id="nomeTreino" class ="form-control me-2">
        </form>
        <button id="btnAddEx" class="btn btn-primary my-4 terminal-command">
          adicionar_exercicio
        </button>
    </div>
  </div>

  <!-- Container separado para exercícios adicionados -->
  <div id="exerciciosAdicionados" class="container my-4"></div>

  <!-- Botão de finalizar sempre no final -->
  <div id="containerBotaoFinalizar" class="container my-4 text-center"></div>

  <script src="JSFiles/terminal.js"></script>
  <script src="JSFiles/config.js"></script>
  <script src="JSFiles/auth.js"></script>
  <script src="JSFiles/cadTreino.js"></script>
</body>
</html>
