<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OldBook Treinos - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-dark">
    <div class="container">
      <a class="btn btn-primary" href="index.html">voltar</a>
      <a class="navbar-brand fw-bold" href="index.html">OldBook Treinos</a>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="text-center mb-4">Cadastrar</h2>
    <div id="treinos" class="row g-4"></div>
  </div>

  <div id="containerAddTreino" class="form-control form-control-sm d-inline-block me-2 mb-2 text-center">
    <div id="idRemover">
        <form>
          <label for="nomeUsuario">Digite o nome do treino:</label>
          <input type="text" id="nomeTreino" class ="form-control me-2">
        </form>
        <button class="btn btn-primary my-4" onclick="addExFunc()">
          Adicionar Exercicio
        </button>
    </div>
  </div>

  <script>
container = document.getElementById("containerAddTreino");

function addExFunc() {
  const nomeTreino = document.getElementById("nomeTreino").value;

  if (!nomeTreino.trim()) {
    alert("Digite o nome do treino antes!");
    return;
  }

  const bloco = `
    <div class="card p-3 mb-3 shadow-sm">

      <h5 class="mb-3">${nomeTreino}</h5>

      <div class="mb-2">
        <label class="form-label fw-semibold">Séries:</label><br>
        <input   
          type="number"
          id="inputSeries"
          min="1"
          max="10"
          step="1"         
          value="1"
          class="form-control me-2">
      </div>

      <div class="mb-2">
          <label class="form-label fw-semibold">Peso:</label>
          <input 
            type="number" 
            min="1"
            step="1"
            value="1"
            class="form-control me-2">
      </div>
          
      <div id="boxReps"></div>

      <div>
        <button class="btn btn-primary" onclick="proximoEx()">Proximo</button>
      </div>

    </div>`;

    container.innerHTML += bloco;

    // Remover bloco de cima
    document.getElementById("idRemover").remove();

    // ⚡ Aplica evento de mudança no número de séries
    const seriesInput = document.getElementById("inputSeries");
    const boxReps = document.getElementById("boxReps");

    // função que cria inputs conforme a quantidade de séries
    function gerarReps(qtd) {
        boxReps.innerHTML = ""; // limpa antes

        for (let i = 1; i <= qtd; i++) {
            boxReps.innerHTML += `
                <div class="mb-2">
                    <label class="form-label">Repetições ${i}:</label>
                    <input  
                        type="number"
                        min="1"
                        class="form-control me-2">
                </div>
            `;
        }
    }

    // cria automaticamente as reps da série inicial (1)
    gerarReps(seriesInput.value);

    // sempre que o usuário mudar:
    seriesInput.addEventListener("input", () => {
        gerarReps(seriesInput.value);
    });
}
</script>
</body>
</html>
