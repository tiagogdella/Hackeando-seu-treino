<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hackeando seu treino">
  <title>Treino - Hackeando seu Treino</title>
  <link rel="icon" type="image/png" href="IMG/logoMenor.png">
  <link rel="apple-touch-icon" href="IMG/apple-touch-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-dark">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand fw-bold" href="index.html">&lt; voltar</a>
      <span class="fw-bold terminal-command" id="treinoNome"></span>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger terminal-command">
        logout
      </button>
    </div>
  </nav>

  <div class="container my-4">
    <div id="exercicios"></div>
    <button class="btn btn-success mt-4 terminal-command" id="btnFinalizar">finalizar_treino</button>
  </div>

  <script src="JSFiles/terminal.js"></script>
  <script src="JSFiles/config.js"></script>
  <script src="JSFiles/auth.js"></script>
  <script>
    let treinoId = null;
    let execucaoId = null;
    let treino = null;
    let ultimoTreino = null;

    // === PERSISTÊNCIA LOCAL ===

    function salvarEstadoLocal() {
      if (!treino || !treinoId || !execucaoId) return;
      const estado = {
        execucaoId,
        timestamp: Date.now(),
        exercicios: treino.exercicios.map((ex, i) => {
          const numSeriesEl = document.getElementById(`numSeries-${i}`);
          if (!numSeriesEl) return null;
          const numSeries = parseInt(numSeriesEl.value);
          const series = [];
          for (let s = 0; s < numSeries; s++) {
            const pesoEl = document.getElementById(`peso-${i}-${s}`);
            const repsEl = document.getElementById(`reps-${i}-${s}`);
            series.push({ peso: pesoEl ? pesoEl.value : '', reps: repsEl ? repsEl.value : '' });
          }
          return { numSeries, series };
        })
      };
      localStorage.setItem(`treino_estado_${treinoId}`, JSON.stringify(estado));
    }

    function restaurarEstadoLocal(estado) {
      if (!treino || !estado.exercicios) return;
      if (estado.exercicios.length !== treino.exercicios.length) return;
      estado.exercicios.forEach((exDados, i) => {
        if (!exDados) return;
        const numSeriesEl = document.getElementById(`numSeries-${i}`);
        if (!numSeriesEl) return;
        if (parseInt(numSeriesEl.value) !== exDados.numSeries) {
          numSeriesEl.value = exDados.numSeries;
          gerarInputsSeries(i);
        }
        exDados.series.forEach((serie, s) => {
          const pesoEl = document.getElementById(`peso-${i}-${s}`);
          const repsEl = document.getElementById(`reps-${i}-${s}`);
          if (pesoEl && serie.peso !== '') pesoEl.value = serie.peso;
          if (repsEl && serie.reps !== '') repsEl.value = serie.reps;
        });
      });
      window.Terminal.showLog('Treino restaurado — continue de onde parou!', 'info');
    }

    function iniciarKeepalive() {
      // Ping a cada 8 minutos para manter sessão e backend acordado
      setInterval(async () => {
        try {
          const res = await apiFetch('/api/auth/status');
          const dados = await res.json();
          if (!dados.autenticado) {
            window.Terminal.showError('Sessão expirada. Redirecionando...');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
          }
        } catch (e) { /* ignora erro de rede, tenta novamente no próximo ciclo */ }
      }, 8 * 60 * 1000);

      // Auto-save a cada 30 segundos
      setInterval(salvarEstadoLocal, 30 * 1000);
    }

    // Salva antes de sair da página (reload, fechar aba, etc.)
    window.addEventListener('beforeunload', salvarEstadoLocal);

    // Carrega treino e inicia execução
    async function iniciarTreino() {
      treinoId = localStorage.getItem("treinoSelecionado");

      if (!treinoId) {
        window.Terminal.showError("Erro: Nenhum treino selecionado");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 2000);
        return;
      }

      // Verifica se há estado salvo recente (até 6h)
      let estadoSalvo = null;
      const estadoStr = localStorage.getItem(`treino_estado_${treinoId}`);
      if (estadoStr) {
        try {
          const parsed = JSON.parse(estadoStr);
          if (Date.now() - parsed.timestamp < 6 * 60 * 60 * 1000) {
            estadoSalvo = parsed;
          } else {
            localStorage.removeItem(`treino_estado_${treinoId}`);
          }
        } catch (e) {
          localStorage.removeItem(`treino_estado_${treinoId}`);
        }
      }

      try {
        // Busca detalhes do treino
        const resposta = await apiFetch(`/api/treinos/${treinoId}`);
        treino = await resposta.json();

        document.getElementById("treinoNome").textContent = treino.nome;

        // Busca dados do último treino completo (se existir)
        const resUltimo = await apiFetch(`/api/treinos/${treinoId}/ultimo`);
        ultimoTreino = await resUltimo.json();

        // Tenta reutilizar execução salva (evita criar várias execuções vazias)
        if (estadoSalvo && estadoSalvo.execucaoId) {
          try {
            const resExec = await apiFetch(`/api/execucoes/${estadoSalvo.execucaoId}`);
            if (resExec.ok) {
              const dadosExec = await resExec.json();
              if (dadosExec.volume_total == null) {
                execucaoId = estadoSalvo.execucaoId;
              }
            }
          } catch (e) { /* ignora, cria nova execução abaixo */ }
        }

        // Cria nova execução apenas se não reutilizou uma existente
        if (!execucaoId) {
          const resExec = await apiFetch(`/api/treinos/${treinoId}/executar`, {
            method: "POST"
          });
          const dadosExec = await resExec.json();
          execucaoId = dadosExec.execucao_id;
        }

        // Renderiza exercícios com dados do último treino completo
        renderizarExercicios();

        // Restaura estado salvo por cima (sobrescreve com o que o usuário já tinha digitado)
        if (estadoSalvo) {
          restaurarEstadoLocal(estadoSalvo);
        }

        iniciarKeepalive();

      } catch (erro) {
        window.Terminal.showError("Erro ao carregar treino: " + erro.message);
        setTimeout(() => {
          window.location.href = "index.html";
        }, 2000);
      }
    }

    function renderizarExercicios() {
      const container = document.getElementById("exercicios");
      container.innerHTML = "";

      treino.exercicios.forEach((ex, i) => {
        // Busca dados do último treino para este exercício
        let dadosUltimo = null;
        if (ultimoTreino.existe) {
          dadosUltimo = ultimoTreino.series_por_exercicio.find(s => s.exercicio_id === ex.id);
        }

        const numSeriesInicial = dadosUltimo ? dadosUltimo.series.length : 3;
        const isIsometrico = ex.tipo === 'isometrico';
        const labelUnidade = isIsometrico ? 'Segundos' : 'Repetições';
        const emojiTipo = isIsometrico ? '⏱️' : '🏋️';

        const bloco = `
          <div class="card p-3 mb-3 shadow-sm">
            <h5 class="mb-3">${emojiTipo} ${ex.nome}</h5>

            <div class="mb-2">
              <label class="form-label fw-semibold terminal-prompt">Número de séries</label>
              <input
                type="number"
                id="numSeries-${i}"
                class="form-control"
                min="1"
                max="15"
                value="${numSeriesInicial}"
                onchange="gerarInputsSeries(${i}); salvarEstadoLocal()">
            </div>

            <div id="seriesContainer-${i}"></div>
          </div>
        `;
        container.innerHTML += bloco;

        // Gera inputs com dados pré-preenchidos
        gerarInputsSeries(i);
      });
    }

    function gerarInputsSeries(exIndex) {
      const exercicio = treino.exercicios[exIndex];
      const numSeries = document.getElementById(`numSeries-${exIndex}`).value;
      const container = document.getElementById(`seriesContainer-${exIndex}`);

      // Busca dados do último treino para este exercício
      let dadosUltimo = null;
      if (ultimoTreino.existe) {
        dadosUltimo = ultimoTreino.series_por_exercicio.find(s => s.exercicio_id === exercicio.id);
      }

      const isIsometrico = exercicio.tipo === 'isometrico';
      const labelUnidade = isIsometrico ? 'Segundos' : 'Repetições';

      container.innerHTML = "";

      for (let s = 0; s < numSeries; s++) {
        // Pré-preenche com dados do último treino (se existir)
        let pesoAnterior = "";
        let repsAnterior = "";

        if (dadosUltimo && dadosUltimo.series[s]) {
          pesoAnterior = dadosUltimo.series[s].peso;
          repsAnterior = dadosUltimo.series[s].repeticoes;
        }

        container.innerHTML += `
          <div class="row mb-2">
            <div class="col">
              <label class="form-label terminal-prompt">S${s + 1} Peso (kg)</label>
              <input
                type="number"
                id="peso-${exIndex}-${s}"
                class="form-control"
                min="0"
                step="0.5"
                value="${pesoAnterior}"
                placeholder="${pesoAnterior || '80'}"
                oninput="salvarEstadoLocal()">
            </div>
            <div class="col">
              <label class="form-label terminal-prompt">${labelUnidade}</label>
              <input
                type="number"
                id="reps-${exIndex}-${s}"
                class="form-control"
                min="1"
                value="${repsAnterior}"
                placeholder="${repsAnterior || (isIsometrico ? '30' : '10')}"
                oninput="salvarEstadoLocal()">
            </div>
          </div>
        `;
      }
    }

    async function finalizarTreino() {
      if (!execucaoId) {
        window.Terminal.showError("Erro: Execução não foi iniciada");
        return;
      }

      const btnFinalizar = document.getElementById("btnFinalizar");
      btnFinalizar.disabled = true;
      btnFinalizar.textContent = "$ salvando...";

      try {
        // Coleta dados de todas as séries
        let ordemGlobal = 1;

        for (let i = 0; i < treino.exercicios.length; i++) {
          const exercicio = treino.exercicios[i];
          const numSeries = document.getElementById(`numSeries-${i}`).value;

          for (let s = 0; s < numSeries; s++) {
            const peso = document.getElementById(`peso-${i}-${s}`).value;
            const reps = document.getElementById(`reps-${i}-${s}`).value;

            if (!peso || !reps) {
              const isIsometrico = exercicio.tipo === 'isometrico';
              const unidade = isIsometrico ? 'segundos' : 'reps';
              window.Terminal.showError(`Preencha peso e ${unidade} da série ${s + 1} do exercício ${exercicio.nome}`);
              btnFinalizar.disabled = false;
              btnFinalizar.textContent = "finalizar_treino";
              return;
            }

            // Salva série na API
            await apiFetch(`/api/execucoes/${execucaoId}/series`, {
              method: "POST",
              body: JSON.stringify({
                exercicio_id: exercicio.id,
                peso: parseFloat(peso),
                repeticoes: parseInt(reps),
                ordem: ordemGlobal
              })
            });

            ordemGlobal++;
          }
        }

        // Finaliza execução (calcula volume)
        const resFinal = await apiFetch(`/api/execucoes/${execucaoId}/finalizar`, {
          method: "POST"
        });

        const resultado = await resFinal.json();

        // Busca progressão
        const resProgressao = await apiFetch(`/api/treinos/${treinoId}/progressao`);
        const progressao = await resProgressao.json();

        // Mostra resultado
        let mensagem = `Treino finalizado! Volume: ${resultado.volume_total.toFixed(2)}kg`;

        if (progressao.progresso_percentual !== null) {
          const sinal = progressao.progresso_percentual >= 0 ? "+" : "";
          mensagem += ` | Progressão: ${sinal}${progressao.progresso_percentual.toFixed(2)}%`;
        }

        localStorage.removeItem(`treino_estado_${treinoId}`);
        window.Terminal.showSuccess(mensagem);

        // Mostra deltas individuais se houver
        if (progressao.delta_reps_por_exercicio && progressao.delta_reps_por_exercicio.length > 0) {
          progressao.delta_reps_por_exercicio.forEach(item => {
            const ex = treino.exercicios.find(e => e.nome === item.exercicio_nome);
            const unidade = ex && ex.tipo === 'isometrico' ? 'seg' : 'reps';
            const sinal = item.delta_reps > 0 ? '+' : '';
            const tipo = item.delta_reps >= 0 ? 'success' : 'info';

            setTimeout(() => {
              window.Terminal.showLog(`${item.exercicio_nome}: ${sinal}${item.delta_reps} ${unidade}`, tipo);
            }, 500);
          });
        }

        setTimeout(() => {
          window.location.href = "index.html";
        }, 3000);

      } catch (erro) {
        window.Terminal.showError("Erro ao finalizar treino: " + erro.message);
        btnFinalizar.disabled = false;
        btnFinalizar.textContent = "finalizar_treino";
      }
    }

    // Event listeners
    document.getElementById("btnFinalizar").addEventListener("click", finalizarTreino);

    // Inicia ao carregar página
    iniciarTreino();
  </script>
</body>
</html>
